<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bg)"/>
  <!-- Duck body (simplified) -->
  <ellipse cx="128" cy="148" rx="60" ry="48" fill="url(#body)" stroke="#E0E0E0" stroke-width="2"/>
  <!-- Duck head -->
  <circle cx="168" cy="98" r="30" fill="url(#body)" stroke="#E0E0E0" stroke-width="2"/>
  <!-- Duck eye -->
  <circle cx="178" cy="90" r="5" fill="#333333"/>
  <circle cx="179.5" cy="88.5" r="1.5" fill="#FFFFFF"/>
  <!-- Duck beak -->
  <path d="M 192 98 Q 212 92 210 100 Q 212 108 192 104 Z" fill="#FF6D00" stroke="#E65100" stroke-width="1"/>
  <!-- Database cylinder lines on body -->
  <ellipse cx="118" cy="130" rx="32" ry="10" fill="none" stroke="#FF6D00" stroke-width="2.5" opacity="0.7"/>
  <line x1="86" y1="130" x2="86" y2="155" stroke="#FF6D00" stroke-width="2.5" opacity="0.7"/>
  <line x1="150" y1="130" x2="150" y2="155" stroke="#FF6D00" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="118" cy="155" rx="32" ey="10" fill="none" stroke="#FF6D00" stroke-width="2.5" opacity="0.7"/>
  <path d="M 86 142 Q 118 152 150 142" fill="none" stroke="#FF6D00" stroke-width="2" opacity="0.5"/>
  <!-- Notebook lines at bottom -->
  <line x1="60" y1="200" x2="196" y2="200" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="60" y1="212" x2="170" y2="212" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="60" y1="224" x2="140" y2="224" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>