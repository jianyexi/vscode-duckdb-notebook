name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to VS Code Marketplace'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
            npm_arch: x64
          - os: macos-latest
            target: darwin-arm64
            npm_arch: arm64
          - os: macos-latest
            target: darwin-x64
            npm_arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install platform-specific DuckDB bindings
        shell: bash
        run: |
          # Read the version from @duckdb/node-bindings
          BINDINGS_VERSION=$(node -e "console.log(require('./node_modules/@duckdb/node-bindings/package.json').version)")
          PKG="@duckdb/node-bindings-${{ matrix.target }}"
          echo "Installing ${PKG}@${BINDINGS_VERSION}"
          npm install "${PKG}@${BINDINGS_VERSION}" --no-save --force

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true
          path: vsix

      - name: Verify all platform VSIX files
        run: |
          EXPECTED=3
          COUNT=$(ls vsix/*.vsix 2>/dev/null | wc -l)
          echo "Found $COUNT VSIX files (expected $EXPECTED)"
          ls -la vsix/
          if [ "$COUNT" -ne "$EXPECTED" ]; then
            echo "::error::Expected $EXPECTED VSIX files but found $COUNT. Aborting publish."
            exit 1
          fi
          for f in vsix/*.vsix; do
            SIZE=$(stat -c%s "$f")
            echo "$f: ${SIZE} bytes"
            if [ "$SIZE" -lt 1000 ]; then
              echo "::error::VSIX file $f is suspiciously small (${SIZE} bytes). Aborting."
              exit 1
            fi
          done

      - name: Publish to VS Code Marketplace
        run: |
          FAILED=0
          for f in vsix/*.vsix; do
            echo "Publishing $f ..."
            if OUTPUT=$(npx @vscode/vsce publish --packagePath "$f" 2>&1); then
              echo "✅ Published $f"
            else
              if echo "$OUTPUT" | grep -qi "already exists"; then
                echo "⚠️ Skipped $f (already published)"
              else
                echo "❌ Failed to publish $f"
                echo "$OUTPUT"
                FAILED=1
              fi
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more VSIX files failed to publish (not due to already existing)."
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: vsix/*.vsix
          generate_release_notes: true
